<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ödeme Takip — UI Demo</title>
  <style>
    :root{
      --bg:#0b1220; --panel:#111a2e; --card:#0f1730;
      --text:#e8f0ff; --muted:#8ea3c7; --line:#1e2a46;
      --good:#2dd4bf; --bad:#fb7185; --warn:#fbbf24; --brand:#4f7cff;
      --shadow: 0 18px 45px rgba(0,0,0,.32);
      --r:16px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(1100px 600px at 20% -10%, rgba(79,124,255,.25), transparent 55%),
                  radial-gradient(900px 500px at 90% 0%, rgba(45,212,191,.16), transparent 55%),
                  linear-gradient(180deg,#071022,#0b1220 40%, #081025);
      color:var(--text);
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:16px;
    }
    .phone{
      width:min(430px, 100%);
      border:1px solid rgba(255,255,255,.06);
      background: rgba(12,18,35,.65);
      backdrop-filter: blur(10px);
      border-radius: 26px;
      box-shadow: var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    /* Top bar */
    .topbar{
      padding:14px 14px 10px;
      border-bottom:1px solid var(--line);
      background: linear-gradient(180deg, rgba(17,26,46,.8), rgba(17,26,46,.35));
    }
    .toprow{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .title{
      display:flex; flex-direction:column; gap:2px;
    }
    .title h1{ margin:0; font-size:14px; letter-spacing:.2px; }
    .title small{ color:var(--muted); font-size:12px; }
    .btn{
      border:1px solid var(--line);
      background: rgba(15,23,48,.9);
      color:var(--text);
      border-radius: 14px;
      padding:10px 12px;
      font-weight:700;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:8px;
      user-select:none;
    }
    .btn:hover{ filter:brightness(1.08); }
    .btn.primary{ background: rgba(79,124,255,.95); border-color: rgba(79,124,255,.55); }
    .btn.ghost{ background: transparent; }
    .btn.small{ padding:8px 10px; border-radius: 12px; font-size:12px; font-weight:700; }
    .chip{
      border:1px solid var(--line);
      background: rgba(14,22,42,.9);
      padding:8px 10px;
      border-radius: 999px;
      display:inline-flex;
      gap:10px;
      align-items:center;
      color: #cfe0ff;
      font-weight:700;
      font-size:12px;
    }
    .monthbar{
      margin-top:10px;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .monthbar .controls{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

    /* Toggle segmented */
    .seg{
      display:flex; gap:0; border:1px solid var(--line);
      border-radius: 14px; overflow:hidden;
      background: rgba(14,22,42,.7);
    }
    .seg button{
      border:0; background:transparent; color:var(--muted);
      padding:9px 12px; cursor:pointer; font-weight:800; font-size:12px;
    }
    .seg button.active{
      background: rgba(79,124,255,.22);
      color: var(--text);
    }

    /* Content */
    .content{
      padding:12px 12px 86px;
      display:flex;
      flex-direction:column;
      gap:12px;
      overflow:auto;
    }
    .cards{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }
    .card{
      background: rgba(17,26,46,.62);
      border:1px solid var(--line);
      border-radius: var(--r);
      padding:12px;
    }
    .kpi{
      display:flex; flex-direction:column; gap:6px;
    }
    .kpi .label{ color:var(--muted); font-size:12px; }
    .kpi .value{ font-size:18px; font-weight:900; letter-spacing:.2px; }
    .value.bad{ color:var(--bad); }
    .value.good{ color:var(--good); }

    .toolbar{
      display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
    }
    .toolbar .left{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .toolbar input, .toolbar select{
      border:1px solid var(--line);
      background: rgba(14,22,42,.9);
      color: var(--text);
      padding:10px 12px;
      border-radius: 14px;
      outline:none;
      font-weight:650;
      width: 100%;
    }
    .toolbar .search{ min-width: 190px; }
    .toolbar select{ padding-right: 30px; }

    /* List */
    .list{
      background: rgba(17,26,46,.4);
      border:1px solid var(--line);
      border-radius: var(--r);
      overflow:hidden;
    }
    .rowItem{
      display:grid;
      grid-template-columns: 82px 1fr auto;
      gap:10px;
      padding:12px;
      border-top:1px solid rgba(255,255,255,.06);
      align-items:center;
    }
    .rowItem:first-child{ border-top:0; }
    .date{
      font-size:12px; color:#cfe0ff; font-weight:850;
    }
    .meta{
      display:flex; flex-direction:column; gap:4px;
      min-width:0;
    }
    .meta .desc{
      font-weight:850; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .meta .sub{
      color:var(--muted); font-size:12px; display:flex; gap:8px; flex-wrap:wrap;
    }
    .tag{
      font-size:12px; font-weight:800;
      padding:4px 8px; border-radius: 999px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(14,22,42,.9);
      color:#cfe0ff;
    }
    .tag.bad{ border-color: rgba(251,113,133,.35); background: rgba(42,16,24,.85); color:#ffb3c2; }
    .tag.good{ border-color: rgba(45,212,191,.35); background: rgba(13,42,34,.85); color:#8ff6e4; }
    .tag.rec{ border-color: rgba(79,124,255,.35); background: rgba(27,35,56,.85); color:#c5d3ff; }
    .amt{
      text-align:right;
      font-weight:950;
      letter-spacing:.2px;
      white-space:nowrap;
    }

    /* Calendar */
    .calendar{
      background: rgba(17,26,46,.4);
      border:1px solid var(--line);
      border-radius: var(--r);
      overflow:hidden;
    }
    .calHead{
      padding:10px 12px;
      display:flex; justify-content:space-between; align-items:center;
      border-bottom:1px solid rgba(255,255,255,.06);
      color:#cfe0ff;
      font-weight:900;
      font-size:12px;
    }
    .calGrid{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap:0;
    }
    .dow{
      padding:9px 6px;
      text-align:center;
      font-size:11px;
      color:var(--muted);
      border-bottom:1px solid rgba(255,255,255,.06);
      background: rgba(14,22,42,.6);
      font-weight:900;
    }
    .day{
      min-height:64px;
      padding:8px 6px;
      border-bottom:1px solid rgba(255,255,255,.06);
      border-right:1px solid rgba(255,255,255,.06);
      cursor:pointer;
      background: rgba(17,26,46,.22);
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .day:nth-child(7n){ border-right:0; }
    .day .n{
      font-weight:950; font-size:12px; color:#cfe0ff;
      display:flex; justify-content:space-between; align-items:center;
    }
    .mini{
      display:flex; flex-direction:column; gap:4px;
      font-size:11px; color:var(--muted);
    }
    .mini .g{ color: rgba(45,212,191,.95); font-weight:900; }
    .mini .c{ color: rgba(251,113,133,.95); font-weight:900; }
    .day.muted{ opacity:.35; }
    .day.today{ outline:2px solid rgba(79,124,255,.5); outline-offset:-2px; background: rgba(79,124,255,.08); }

    /* Bottom sheet */
    .sheetBg{
      position:fixed; inset:0;
      background: rgba(0,0,0,.55);
      display:none; align-items:flex-end; justify-content:center;
      padding:14px;
    }
    .sheetBg.show{ display:flex; }
    .sheet{
      width:min(430px, 100%);
      background: rgba(15,23,48,.98);
      border:1px solid var(--line);
      border-radius: 20px 20px 20px 20px;
      box-shadow: var(--shadow);
      overflow:hidden;
      max-height: 72vh;
      display:flex; flex-direction:column;
    }
    .sheetTop{
      padding:10px 12px;
      display:flex; align-items:center; justify-content:space-between;
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .sheetTop strong{ font-size:13px; }
    .sheetBody{ padding:10px 12px; overflow:auto; display:flex; flex-direction:column; gap:10px; }
    .sheetItem{
      border:1px solid rgba(255,255,255,.08);
      background: rgba(14,22,42,.75);
      border-radius: 14px;
      padding:10px;
      display:flex; justify-content:space-between; gap:10px; align-items:center;
    }
    .sheetItem .left{ min-width:0; }
    .sheetItem .left .t{ font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .sheetItem .left .s{ font-size:12px; color:var(--muted); margin-top:3px; }
    .sheetItem .right{ font-weight:950; white-space:nowrap; }

    /* Add modal */
    .modalBg{
      position:fixed; inset:0;
      background: rgba(0,0,0,.55);
      display:none; align-items:center; justify-content:center;
      padding:14px;
    }
    .modalBg.show{ display:flex; }
    .modal{
      width:min(430px, 100%);
      background: rgba(15,23,48,.98);
      border:1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .modalTop{
      padding:10px 12px;
      display:flex; justify-content:space-between; align-items:center;
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .modalTop strong{ font-size:13px; }
    .modalBody{ padding:12px; display:flex; flex-direction:column; gap:10px; }
    .grid2{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    .modal input, .modal select{
      border:1px solid var(--line);
      background: rgba(14,22,42,.9);
      color: var(--text);
      padding:10px 12px;
      border-radius: 14px;
      outline:none;
      font-weight:650;
      width:100%;
    }
    .modal .actions{ display:flex; gap:10px; padding:12px; border-top:1px solid rgba(255,255,255,.06); }
    .hint{ font-size:12px; color:var(--muted); }

    /* Bottom tab bar */
    .tabbar{
      position:sticky;
      bottom:0;
      background: linear-gradient(180deg, rgba(11,18,32,.0), rgba(11,18,32,.75) 15%, rgba(11,18,32,.96));
      border-top:1px solid var(--line);
      padding:10px 10px 12px;
      display:flex; gap:10px;
    }
    .tab{
      flex:1;
      border:1px solid rgba(255,255,255,.06);
      background: rgba(14,22,42,.7);
      border-radius: 16px;
      padding:10px 10px;
      cursor:pointer;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      color:var(--muted);
      font-weight:900;
      font-size:11px;
      user-select:none;
    }
    .tab.active{
      color: var(--text);
      border-color: rgba(79,124,255,.35);
      background: rgba(79,124,255,.14);
    }
    .ico{ font-size:16px; line-height:1; }

    /* Helpers */
    .hide{ display:none !important; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="topbar">
      <div class="toprow">
        <div class="title">
          <h1>Ödeme Takip</h1>
          <small id="subtitle">Gider • Liste</small>
        </div>
        <button id="btnAdd" class="btn primary small">＋ Ekle</button>
      </div>

      <div class="monthbar">
        <div class="controls">
          <button id="btnPrev" class="btn small">◀</button>
          <span class="chip"><span>📅</span><span id="monthLabel">—</span></span>
          <button id="btnNext" class="btn small">▶</button>
        </div>

        <div class="controls">
          <div class="seg" role="tablist" aria-label="Görünüm">
            <button id="btnListView" class="active" type="button">Liste</button>
            <button id="btnCalView" type="button">Takvim</button>
          </div>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="cards">
        <div class="card kpi">
          <div class="label">Bu Ay Gider</div>
          <div class="value bad" id="kpiExpense">₺0</div>
          <div class="hint" id="kpiExpenseHint">Ödenen/Ödenmeyen</div>
        </div>
        <div class="card kpi">
          <div class="label">Bu Ay Gelir</div>
          <div class="value good" id="kpiIncome">₺0</div>
          <div class="hint" id="kpiIncomeHint">Toplam gelir</div>
        </div>
      </div>

      <div class="card">
        <div class="toolbar">
          <div class="left">
            <select id="statusFilter" style="min-width:160px;">
              <option value="all">Durum: Hepsi</option>
              <option value="unpaid">Durum: Alınmadı/Ödenmedi</option>
              <option value="paid">Durum: Alındı/Ödendi</option>
            </select>
            <input id="search" class="search" placeholder="Ara (açıklama / kişi / kategori)" />
          </div>
          <button id="btnDemo" class="btn small">Demo veri ekle</button>
        </div>
        <div class="hint" id="infoLine" style="margin-top:10px;"></div>
      </div>

      <!-- LIST -->
      <div id="listWrap" class="list"></div>

      <!-- CALENDAR -->
      <div id="calWrap" class="calendar hide">
        <div class="calHead">
          <span>Takvim</span>
          <span class="hint">Gün’e tıkla → detay</span>
        </div>
        <div class="calGrid" id="calGrid"></div>
      </div>
    </div>

    <div class="tabbar">
      <div class="tab active" data-tab="expense"><div class="ico">💸</div>Gider</div>
      <div class="tab" data-tab="income"><div class="ico">💰</div>Gelir</div>
      <div class="tab" data-tab="calendar"><div class="ico">📆</div>Takvim</div>
      <div class="tab" data-tab="settings"><div class="ico">⚙️</div>Ayarlar</div>
    </div>
  </div>

  <!-- Day Sheet -->
  <div id="sheetBg" class="sheetBg" aria-hidden="true">
    <div class="sheet" role="dialog" aria-modal="true">
      <div class="sheetTop">
        <strong id="sheetTitle">Gün Detayı</strong>
        <button id="sheetClose" class="btn small ghost">✕</button>
      </div>
      <div id="sheetBody" class="sheetBody"></div>
    </div>
  </div>

  <!-- Add Modal -->
  <div id="modalBg" class="modalBg" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modalTop">
        <strong id="modalTitle">Yeni Kayıt</strong>
        <button id="modalClose" class="btn small ghost">✕</button>
      </div>
      <div class="modalBody">
        <div class="grid2">
          <select id="mType">
            <option value="expense">Gider</option>
            <option value="income">Gelir</option>
          </select>
          <select id="mStatus">
            <option value="unpaid">Alınmadı/Ödenmedi</option>
            <option value="paid">Alındı/Ödendi</option>
          </select>
        </div>
        <div class="grid2">
          <input id="mAmount" type="number" step="0.01" placeholder="Tutar (₺)" />
          <input id="mDate" type="date" />
        </div>
        <div class="grid2">
          <input id="mPerson" placeholder="Kişi (opsiyon)" />
          <input id="mCategory" placeholder="Kategori (örn: Kira, Maaş)" />
        </div>
        <input id="mDesc" placeholder="Açıklama (örn: Macbook taksiti)" />
        <label class="hint" style="display:flex; gap:10px; align-items:center;">
          <input id="mRecurring" type="checkbox" />
          Tekrarlayan (Aylık)
        </label>
        <div class="grid2">
          <input id="mRepeatMonths" type="number" min="1" max="60" value="4" placeholder="Kaç ay?" />
          <input id="mStartMonth" placeholder="Başlangıç ayı (YYYY-MM)" />
        </div>
        <div class="hint">Not: Bu demo — “Tekrarlayan” sadece UI mantığıdır. Firebase’e bağlayınca gerçek kayda dönecek.</div>
      </div>
      <div class="actions">
        <button id="modalSave" class="btn primary" style="flex:1;">Kaydet</button>
        <button id="modalCancel" class="btn" style="flex:1;">Vazgeç</button>
      </div>
    </div>
  </div>

  <script>
    // ===== Demo State =====
    const fmt = new Intl.NumberFormat("tr-TR", { style:"currency", currency:"TRY" });

    let tab = "expense";     // expense | income | calendar | settings
    let view = "list";       // list | calendar
    let selectedMonth = ymFromDate(new Date());
    let items = [];          // transactions in-memory

    // ===== Utils =====
    function pad2(n){ return String(n).padStart(2,"0"); }
    function ymFromDate(d){ return d.getFullYear()+"-"+pad2(d.getMonth()+1); }
    function nextMonth(ym){
      const p = ym.split("-"); const y = Number(p[0]); const m = Number(p[1]);
      const d = new Date(y, m-1, 1); d.setMonth(d.getMonth()+1);
      return ymFromDate(d);
    }
    function prevMonth(ym){
      const p = ym.split("-"); const y = Number(p[0]); const m = Number(p[1]);
      const d = new Date(y, m-1, 1); d.setMonth(d.getMonth()-1);
      return ymFromDate(d);
    }
    function todayStr(){
      const d = new Date();
      return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());
    }
    function escapeHtml(s){
      return String(s ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"
      }[m]));
    }
    function monthOf(dateStr){ return (dateStr || "").slice(0,7); }

    // ===== DOM =====
    const $ = (id) => document.getElementById(id);

    // Tabs
    document.querySelectorAll(".tab").forEach(el=>{
      el.addEventListener("click", ()=>{
        document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
        el.classList.add("active");
        tab = el.dataset.tab;
        if (tab === "calendar") { view = "calendar"; }
        if (tab === "settings") { view = "list"; }
        renderAll();
      });
    });

    // Month nav
    $("btnPrev").addEventListener("click", ()=>{ selectedMonth = prevMonth(selectedMonth); renderAll(); });
    $("btnNext").addEventListener("click", ()=>{ selectedMonth = nextMonth(selectedMonth); renderAll(); });

    // View toggle
    $("btnListView").addEventListener("click", ()=>{
      view = "list";
      $("btnListView").classList.add("active");
      $("btnCalView").classList.remove("active");
      renderAll();
    });
    $("btnCalView").addEventListener("click", ()=>{
      view = "calendar";
      $("btnCalView").classList.add("active");
      $("btnListView").classList.remove("active");
      renderAll();
    });

    // Filters
    $("statusFilter").addEventListener("change", renderAll);
    $("search").addEventListener("input", renderAll);

    // Demo button
    $("btnDemo").addEventListener("click", ()=>{
      seedDemo();
      renderAll();
    });

    // Add modal
    $("btnAdd").addEventListener("click", openAddModal);
    $("modalClose").addEventListener("click", closeAddModal);
    $("modalCancel").addEventListener("click", closeAddModal);
    $("modalSave").addEventListener("click", saveModal);

    // Sheet
    $("sheetClose").addEventListener("click", closeSheet);
    $("sheetBg").addEventListener("click", (e)=>{ if(e.target === $("sheetBg")) closeSheet(); });
    $("modalBg").addEventListener("click", (e)=>{ if(e.target === $("modalBg")) closeAddModal(); });

    document.addEventListener("keydown", (e)=>{
      if(e.key === "Escape"){ closeSheet(); closeAddModal(); }
    });

    function openAddModal(){
      $("modalBg").classList.add("show");
      $("mType").value = (tab === "income") ? "income" : "expense";
      $("mStatus").value = "unpaid";
      $("mAmount").value = "";
      $("mDate").value = todayStr();
      $("mPerson").value = "";
      $("mCategory").value = "";
      $("mDesc").value = "";
      $("mRecurring").checked = false;
      $("mRepeatMonths").value = "4";
      $("mStartMonth").value = selectedMonth;
      $("modalTitle").textContent = "Yeni Kayıt";
    }
    function closeAddModal(){ $("modalBg").classList.remove("show"); }

    function openSheet(title, list){
      $("sheetTitle").textContent = title;
      const body = $("sheetBody");
      body.innerHTML = "";
      if(!list.length){
        body.innerHTML = `<div class="hint">Kayıt yok.</div>`;
      } else {
        list.forEach(it=>{
          const cls = it.type === "income" ? "good" : "bad";
          const badge = it.source === "recurring" ? `<span class="tag rec">Aylık</span>` : "";
          body.insertAdjacentHTML("beforeend", `
            <div class="sheetItem">
              <div class="left">
                <div class="t">${escapeHtml(it.desc || "—")}</div>
                <div class="s">${escapeHtml(it.category || "—")} • ${escapeHtml(it.person || "—")} ${badge}</div>
              </div>
              <div class="right" style="color:${it.type==="income" ? "var(--good)" : "var(--bad)"}">${fmt.format(it.amount)}</div>
            </div>
          `);
        });
      }
      $("sheetBg").classList.add("show");
    }
    function closeSheet(){ $("sheetBg").classList.remove("show"); }

    function saveModal(){
      const type = $("mType").value; // income|expense
      const status = $("mStatus").value;
      const amount = Number($("mAmount").value);
      const date = $("mDate").value;
      const person = $("mPerson").value.trim();
      const category = $("mCategory").value.trim();
      const desc = $("mDesc").value.trim();
      const recurring = $("mRecurring").checked;
      const repeatMonths = Number($("mRepeatMonths").value || 1);
      const startMonth = ($("mStartMonth").value || selectedMonth).trim();

      if(!amount || amount <= 0){ alert("Tutar gir."); return; }
      if(!date){ alert("Tarih seç."); return; }

      if(!recurring){
        items.push(makeItem({ type, status, amount, date, person, category, desc, source:"manual" }));
      } else {
        // UI demo: girilen ay dahil X ay boyunca her ay 1 kayıt üret
        const rid = "rec_" + Math.random().toString(36).slice(2,9);
        let ym = startMonth;
        for(let i=0;i<Math.max(1, repeatMonths);i++){
          const d = ym + "-" + date.slice(8,10); // aynı gün
          items.push(makeItem({ type, status, amount, date:d, person, category, desc, source:"recurring", recurrenceId: rid }));
          ym = nextMonth(ym);
        }
      }

      closeAddModal();
      renderAll();
    }

    function makeItem({type, status, amount, date, person, category, desc, source, recurrenceId}){
      return {
        id: "t_" + Math.random().toString(36).slice(2),
        type, status, amount,
        date,
        month: monthOf(date),
        person, category, desc,
        source: source || "manual",
        recurrenceId: recurrenceId || null
      };
    }

    // ===== Demo seed =====
    function seedDemo(){
      // örnek: Şubat'ta girilmiş 4 ay süren aylık gelir
      const start = selectedMonth;
      const rid1 = "rec_demo_income";
      const rid2 = "rec_demo_expense";
      items = items.filter(x => !x.id.startsWith("t_demo_"));

      // recurring income: 4 months
      let ym = start;
      for(let i=0;i<4;i++){
        items.push({
          id:"t_demo_income_"+ym,
          type:"income", status:"unpaid", amount:5533,
          date: ym+"-15",
          month: ym,
          person:"Hüseyin",
          category:"Macbook",
          desc:"Macbook",
          source:"recurring",
          recurrenceId: rid1
        });
        ym = nextMonth(ym);
      }

      // recurring expense: 4 months
      ym = start;
      for(let i=0;i<4;i++){
        items.push({
          id:"t_demo_exp_"+ym,
          type:"expense", status:"unpaid", amount:4800,
          date: ym+"-05",
          month: ym,
          person:"—",
          category:"Kira",
          desc:"Kira",
          source:"recurring",
          recurrenceId: rid2
        });
        ym = nextMonth(ym);
      }

      // manual items
      items.push(makeItem({ type:"expense", status:"paid", amount:320, date: start+"-10", person:"", category:"Market", desc:"Alışveriş", source:"manual" }));
      items.push(makeItem({ type:"income", status:"paid", amount:1500, date: start+"-12", person:"", category:"Freelance", desc:"Ek iş", source:"manual" }));
    }

    // ===== Rendering =====
    function renderAll(){
      $("monthLabel").textContent = selectedMonth;

      const subtitleTab =
        tab === "expense" ? "Gider" :
        tab === "income" ? "Gelir" :
        tab === "calendar" ? "Takvim" : "Ayarlar";

      const subtitleView = (tab === "calendar") ? "Takvim" : (view === "calendar" ? "Takvim" : "Liste");
      $("subtitle").textContent = subtitleTab + " • " + subtitleView;

      // Settings placeholder
      if(tab === "settings"){
        $("listWrap").classList.remove("hide");
        $("calWrap").classList.add("hide");
        $("btnListView").classList.add("active");
        $("btnCalView").classList.remove("active");
        view = "list";
        renderSettings();
        renderKPIs();
        return;
      }

      // tab -> type filter
      // calendar tab shows both types in calendar view
      if(tab === "calendar") view = "calendar";

      $("listWrap").classList.toggle("hide", view === "calendar");
      $("calWrap").classList.toggle("hide", view !== "calendar");

      renderKPIs();

      if(view === "calendar"){
        renderCalendar();
      } else {
        renderList();
      }
    }

    function filteredForMonth(){
      const st = $("statusFilter").value;
      const q = $("search").value.trim().toLowerCase();

      let base = items.filter(it => it.month === selectedMonth);

      // tab filter
      if(tab === "expense") base = base.filter(it => it.type === "expense");
      if(tab === "income") base = base.filter(it => it.type === "income");

      // status
      if(st !== "all") base = base.filter(it => it.status === st);

      // search
      if(q){
        base = base.filter(it => {
          const blob = (it.desc+" "+it.category+" "+it.person).toLowerCase();
          return blob.includes(q);
        });
      }

      // IMPORTANT: UI-side de-dup for recurring (same recurrenceId+month)
      const seen = new Set();
      const out = [];
      for(const it of base){
        const key = (it.source === "recurring" && it.recurrenceId) ? (it.recurrenceId+"_"+it.month) : it.id;
        if(seen.has(key)) continue;
        seen.add(key);
        out.push(it);
      }

      // sort desc by date
      out.sort((a,b)=> (b.date || "").localeCompare(a.date || ""));
      return out;
    }

    function renderKPIs(){
      const monthItems = items.filter(it => it.month === selectedMonth);
      const exp = monthItems.filter(it => it.type === "expense").reduce((s,it)=> s+Number(it.amount||0), 0);
      const inc = monthItems.filter(it => it.type === "income").reduce((s,it)=> s+Number(it.amount||0), 0);
      $("kpiExpense").textContent = fmt.format(exp);
      $("kpiIncome").textContent = fmt.format(inc);

      const expPaid = monthItems.filter(it => it.type === "expense" && it.status === "paid").length;
      const expUn = monthItems.filter(it => it.type === "expense" && it.status !== "paid").length;
      $("kpiExpenseHint").textContent = `Ödendi ${expPaid} • Ödenmedi ${expUn}`;
      $("kpiIncomeHint").textContent = `Toplam ${monthItems.filter(it=>it.type==="income").length} kayıt`;

      const shown = filteredForMonth().length;
      $("infoLine").textContent = `${selectedMonth} içinde ${shown} kayıt görünüyor. (Demo veriler tekilleştirilir)`;
    }

    function renderList(){
      const list = filteredForMonth();
      const wrap = $("listWrap");
      wrap.innerHTML = "";

      if(!list.length){
        wrap.innerHTML = `<div class="rowItem"><div class="meta"><div class="desc">Kayıt yok</div><div class="sub">Demo veri ekle butonuyla örnek ekleyebilirsin.</div></div></div>`;
        return;
      }

      list.forEach(it=>{
        const tagType = it.type === "income"
          ? `<span class="tag good">Gelir</span>`
          : `<span class="tag bad">Gider</span>`;
        const tagRec = it.source === "recurring" ? `<span class="tag rec">Aylık</span>` : "";
        const tagSt = it.status === "paid" ? `<span class="tag good">Alındı/Ödendi</span>` : `<span class="tag">Alınmadı</span>`;
        const amountColor = it.type === "income" ? "var(--good)" : "var(--bad)";

        wrap.insertAdjacentHTML("beforeend", `
          <div class="rowItem">
            <div class="date">${escapeHtml(it.date || "—")}</div>
            <div class="meta">
              <div class="desc">${escapeHtml(it.person || "—")} <span class="muted" style="font-weight:900">•</span> ${escapeHtml(it.category || "—")}</div>
              <div class="sub">
                ${tagType} ${tagRec} ${tagSt}
                <span class="muted">•</span>
                <span>${escapeHtml(it.desc || "")}</span>
              </div>
            </div>
            <div class="amt" style="color:${amountColor}">${fmt.format(it.amount || 0)}</div>
          </div>
        `);
      });
    }

    function renderCalendar(){
      // Calendar shows BOTH types (even if tab=expense/income), unless settings
      const grid = $("calGrid");
      grid.innerHTML = "";

      // DOW headers
      const dows = ["Pzt","Sal","Çar","Per","Cum","Cmt","Paz"];
      dows.forEach(d => grid.insertAdjacentHTML("beforeend", `<div class="dow">${d}</div>`));

      const y = Number(selectedMonth.slice(0,4));
      const m = Number(selectedMonth.slice(5,7));
      const first = new Date(y, m-1, 1);
      const last = new Date(y, m, 0);
      const daysIn = last.getDate();

      // Monday-based index
      const firstDow = (first.getDay() + 6) % 7; // 0=Mon ... 6=Sun
      const totalCells = 42; // 6 weeks
      const startDayNumber = 1 - firstDow;

      const today = new Date();
      const todayYM = ymFromDate(today);
      const todayD = today.getDate();

      for(let i=0;i<totalCells;i++){
        const dayNum = startDayNumber + i;
        const inMonth = dayNum >= 1 && dayNum <= daysIn;

        // actual date for cell
        const dateStr = inMonth ? `${selectedMonth}-${pad2(dayNum)}` : "";

        // totals
        let inc = 0, exp = 0;
        if(inMonth){
          const dayItems = items.filter(it => it.date === dateStr);
          // de-dup recurring per day by (recurrenceId+date)
          const seen = new Set();
          dayItems.forEach(it=>{
            const k = (it.source==="recurring" && it.recurrenceId) ? (it.recurrenceId+"_"+it.date) : it.id;
            if(seen.has(k)) return;
            seen.add(k);
            if(it.type==="income") inc += Number(it.amount||0);
            else exp += Number(it.amount||0);
          });
        }

        const clsMuted = inMonth ? "" : "muted";
        const clsToday = (inMonth && selectedMonth === todayYM && dayNum === todayD) ? "today" : "";
        grid.insertAdjacentHTML("beforeend", `
          <div class="day ${clsMuted} ${clsToday}" data-date="${dateStr}">
            <div class="n">
              <span>${inMonth ? dayNum : ""}</span>
              <span style="opacity:.75">${inMonth ? "" : ""}</span>
            </div>
            ${inMonth ? `
              <div class="mini">
                <div class="g">+ ${fmt.format(inc).replace("₺","₺")}</div>
                <div class="c">- ${fmt.format(exp).replace("₺","₺")}</div>
              </div>
            ` : ``}
          </div>
        `);
      }

      // click handlers
      grid.querySelectorAll(".day").forEach(cell=>{
        cell.addEventListener("click", ()=>{
          const d = cell.getAttribute("data-date");
          if(!d) return;
          const dayItems = items.filter(it => it.date === d);
          // de-dup recurring per day
          const seen = new Set();
          const list = [];
          dayItems.forEach(it=>{
            const k = (it.source==="recurring" && it.recurrenceId) ? (it.recurrenceId+"_"+it.date) : it.id;
            if(seen.has(k)) return;
            seen.add(k);
            list.push(it);
          });
          list.sort((a,b)=> (b.amount||0)-(a.amount||0));
          openSheet(d + " • Detay", list);
        });
      });
    }

    function renderSettings(){
      const wrap = $("listWrap");
      wrap.innerHTML = `
        <div class="rowItem" style="grid-template-columns: 1fr;">
          <div class="meta">
            <div class="desc">Ayarlar (Demo)</div>
            <div class="sub">
              <span class="tag">Para Birimi: TRY</span>
              <span class="tag">Tema: Koyu</span>
              <span class="tag rec">Tekrarlayan: UI demo</span>
            </div>
            <div class="hint" style="margin-top:8px;">
              Bir sonraki adım: Bu UI’yi Firebase’e bağlayıp (Auth + Firestore) gerçek veriyle çalıştıracağız.
            </div>
          </div>
        </div>
      `;
    }

    // init
    $("mDate").value = todayStr();
    seedDemo();
    renderAll();
  </script>
</body>
</html>
