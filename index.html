<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoldaş Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c14;
            --surface: #0e1623;
            --card: #131d2e;
            --card2: #182236;
            --border: rgba(99,160,255,0.12);
            --accent: #4f8eff;
            --accent2: #7fb3ff;
            --glow: rgba(79,142,255,0.18);
            --text: #e8f0ff;
            --muted: #5a7299;
            --low: #34d399;
            --mid: #fbbf24;
            --high: #f87171;
            --low-bg: rgba(52,211,153,0.12);
            --mid-bg: rgba(251,191,36,0.12);
            --high-bg: rgba(248,113,113,0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 28px 20px 120px;
            background-image:
                radial-gradient(ellipse 60% 40% at 70% -10%, rgba(79,142,255,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 50% 30% at -10% 80%, rgba(127,179,255,0.04) 0%, transparent 60%);
        }

        /* ── HEADER ── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 460px;
            margin-bottom: 28px;
            gap: 16px;
        }

        .month-display {
            font-family: 'Syne', sans-serif;
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text);
            text-align: center;
            flex: 1;
        }

        .month-display span {
            display: block;
            font-size: 0.7rem;
            font-weight: 400;
            font-family: 'DM Sans', sans-serif;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .nav-btn {
            width: 42px; height: 42px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 12px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .nav-btn:hover { background: var(--card2); border-color: rgba(79,142,255,0.3); color: var(--accent2); }

        /* ── WEEKDAY LABELS ── */
        .weekday-row {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            width: 100%;
            max-width: 460px;
            margin-bottom: 8px;
        }
        .weekday-label {
            text-align: center;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 4px 0;
        }

        /* ── CALENDAR GRID ── */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            width: 100%;
            max-width: 460px;
            margin-bottom: 24px;
        }

        .day-card {
            background: var(--card);
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 14px;
            cursor: pointer;
            position: relative;
            border: 1px solid var(--border);
            transition: all 0.18s ease;
            font-family: 'Syne', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text);
        }
        .day-card:hover { background: var(--card2); border-color: rgba(79,142,255,0.25); transform: translateY(-1px); }

        .day-card.is-today {
            border-color: var(--accent);
            color: var(--accent2);
            background: rgba(79,142,255,0.07);
        }
        .day-card.is-today::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 14px;
            box-shadow: 0 0 14px rgba(79,142,255,0.2);
            pointer-events: none;
        }
        .day-card.selected-day {
            background: var(--accent) !important;
            border-color: var(--accent) !important;
            color: #fff !important;
            box-shadow: 0 4px 24px rgba(79,142,255,0.4);
        }
        .day-card.selected-day .dot { opacity: 0.85; }
        .day-card.has-tasks { background: var(--card2); }

        .dot-container {
            position: absolute;
            bottom: 6px;
            display: flex;
            gap: 3px;
        }
        .dot { width: 4px; height: 4px; border-radius: 50%; }

        /* ── STATS BAR ── */
        .stats-bar {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 460px;
            margin-bottom: 18px;
        }
        .stat-chip {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 12px;
            text-align: center;
            transition: 0.2s;
        }
        .stat-chip .stat-num {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 4px;
        }
        .stat-chip .stat-lbl {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
        }
        .stat-chip.done .stat-num { color: var(--low); }
        .stat-chip.pending .stat-num { color: var(--mid); }
        .stat-chip.total .stat-num { color: var(--accent2); }

        /* ── INFO PANEL ── */
        .info-panel {
            width: 100%;
            max-width: 460px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 22px;
            overflow: hidden;
        }

        .panel-header {
            padding: 20px 22px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-date {
            font-family: 'Syne', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--accent2);
        }

        .panel-body {
            padding: 8px 0;
            min-height: 80px;
        }

        .empty-state {
            padding: 30px 22px;
            text-align: center;
            color: var(--muted);
            font-size: 0.85rem;
        }
        .empty-state .emoji { font-size: 2rem; display: block; margin-bottom: 8px; }

        /* ── TASK ITEM ── */
        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 22px;
            border-bottom: 1px solid rgba(99,160,255,0.07);
            transition: background 0.15s;
            animation: slideIn 0.2s ease;
        }
        .task-item:last-child { border-bottom: none; }
        .task-item:hover { background: rgba(79,142,255,0.04); }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-item.completed .task-text { text-decoration: line-through; opacity: 0.4; }

        .priority-bar {
            width: 3px;
            height: 36px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .task-check {
            width: 18px; height: 18px;
            border-radius: 6px;
            border: 1.5px solid var(--border);
            cursor: pointer;
            flex-shrink: 0;
            appearance: none;
            background: transparent;
            position: relative;
            transition: all 0.15s;
        }
        .task-check:checked {
            background: var(--low);
            border-color: var(--low);
        }
        .task-check:checked::after {
            content: '✓';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #000;
            font-weight: bold;
        }

        .task-content { flex: 1; min-width: 0; }
        .task-time {
            font-size: 0.65rem;
            color: var(--accent);
            font-weight: 500;
            letter-spacing: 0.05em;
            margin-bottom: 2px;
        }
        .task-text {
            font-size: 0.875rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }

        .task-actions {
            display: flex;
            align-items: center;
            gap: 2px;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .task-item:hover .task-actions { opacity: 1; }

        .action-btn {
            width: 28px; height: 28px;
            border: none;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem;
            transition: all 0.15s;
        }
        .action-btn:hover { background: var(--card2); color: var(--text); }
        .action-btn.del:hover { background: rgba(248,113,113,0.15); color: var(--high); }

        .move-btns { display: flex; flex-direction: column; }
        .move-btns .action-btn { height: 16px; font-size: 0.6rem; }

        /* ── FAB ── */
        .fab {
            position: fixed;
            bottom: 32px;
            right: 50%;
            transform: translateX(50%);
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 16px 32px;
            font-family: 'Syne', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(79,142,255,0.45);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 999;
        }
        .fab:hover { transform: translateX(50%) translateY(-2px); box-shadow: 0 12px 40px rgba(79,142,255,0.55); }
        .fab:active { transform: translateX(50%) translateY(0); }

        /* ── MODAL ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(8,12,20,0.88);
            display: none;
            justify-content: center;
            align-items: flex-end;
            z-index: 1000;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .modal-overlay.open { display: flex; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-content {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 28px 28px 0 0;
            padding: 28px 24px 40px;
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-handle {
            width: 40px; height: 4px;
            background: var(--border);
            border-radius: 4px;
            margin: 0 auto 24px;
        }

        .modal-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .field-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-row { display: flex; gap: 10px; margin-bottom: 20px; }

        input[type="text"], input[type="time"] {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            padding: 13px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.2s;
            outline: none;
        }
        input[type="text"] { flex: 1; }
        input[type="time"] { width: 110px; color: var(--accent2); }
        input:focus { border-color: var(--accent); }

        .p-section { margin-bottom: 24px; }
        .p-boxes { display: flex; gap: 10px; }
        .p-box {
            flex: 1;
            padding: 12px 8px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: all 0.2s;
            border: 1.5px solid transparent;
        }
        .p-box.low { background: var(--low-bg); color: var(--low); border-color: transparent; }
        .p-box.mid { background: var(--mid-bg); color: var(--mid); border-color: transparent; }
        .p-box.high { background: var(--high-bg); color: var(--high); border-color: transparent; }
        .p-box.active.low { border-color: var(--low); box-shadow: 0 0 16px rgba(52,211,153,0.25); }
        .p-box.active.mid { border-color: var(--mid); box-shadow: 0 0 16px rgba(251,191,36,0.25); }
        .p-box.active.high { border-color: var(--high); box-shadow: 0 0 16px rgba(248,113,113,0.25); }

        .modal-footer { display: flex; gap: 12px; }
        .btn-cancel {
            flex: 1;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: transparent;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-cancel:hover { background: var(--card2); color: var(--text); }

        .btn-save {
            flex: 2;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: var(--accent);
            color: white;
            font-family: 'Syne', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(79,142,255,0.3);
        }
        .btn-save:hover { box-shadow: 0 6px 28px rgba(79,142,255,0.45); transform: translateY(-1px); }

        /* scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <button class="nav-btn" onclick="changeMonth(-1)">&#10094;</button>
    <div class="month-display">
        <span>Takvim</span>
        <span id="monthDisplay">Mart 2026</span>
    </div>
    <button class="nav-btn" onclick="changeMonth(1)">&#10095;</button>
</div>

<!-- Weekday Labels -->
<div class="weekday-row">
    <div class="weekday-label">Pt</div>
    <div class="weekday-label">Sa</div>
    <div class="weekday-label">Ça</div>
    <div class="weekday-label">Pe</div>
    <div class="weekday-label">Cu</div>
    <div class="weekday-label" style="color:#f87171">Ct</div>
    <div class="weekday-label" style="color:#f87171">Pz</div>
</div>

<!-- Calendar -->
<div class="calendar-grid" id="grid"></div>

<!-- Stats -->
<div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat-chip total">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-lbl">Toplam</div>
    </div>
    <div class="stat-chip done">
        <div class="stat-num" id="statDone">0</div>
        <div class="stat-lbl">Tamamlandı</div>
    </div>
    <div class="stat-chip pending">
        <div class="stat-num" id="statPending">0</div>
        <div class="stat-lbl">Bekliyor</div>
    </div>
</div>

<!-- Panel -->
<div class="info-panel" id="infoPanel">
    <div class="panel-header">
        <div class="panel-date" id="panelTitle">Bir Gün Seçin</div>
    </div>
    <div class="panel-body">
        <div class="empty-state" id="emptyState">
            <span class="emoji">📅</span>
            Notlar için takvimden bir güne dokunun.
        </div>
        <div id="taskList"></div>
    </div>
</div>

<!-- FAB -->
<button class="fab" onclick="openAddModal()">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
    Not Ekle
</button>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
    <div class="modal-content">
        <div class="modal-handle"></div>
        <div class="modal-title" id="modalTitle">Yeni Not</div>

        <div class="field-label">Not içeriği & Saat</div>
        <div class="input-row">
            <input type="text" id="taskIn" placeholder="Bugün ne yapacaksınız?">
            <input type="time" id="timeIn">
        </div>

        <div class="p-section">
            <div class="field-label">Öncelik</div>
            <div class="p-boxes">
                <div class="p-box low" id="p-low" onclick="setP('low')">Düşük</div>
                <div class="p-box mid" id="p-mid" onclick="setP('mid')">Orta</div>
                <div class="p-box high" id="p-high" onclick="setP('high')">Yüksek</div>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">İptal</button>
            <button class="btn-save" onclick="saveData()">Kaydet</button>
        </div>
    </div>
</div>

<script>
    let viewDate = new Date();
    let selectedKey = null;
    let selectedP = 'low';
    let editIdx = null;

    function renderCalendar() {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        const y = viewDate.getFullYear(), m = viewDate.getMonth();
        document.getElementById('monthDisplay').innerText =
            new Intl.DateTimeFormat('tr-TR', { month: 'long', year: 'numeric' }).format(viewDate);

        let firstDay = new Date(y, m, 1).getDay();
        firstDay = firstDay === 0 ? 6 : firstDay - 1;
        const daysInMonth = new Date(y, m + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) {
            const ph = document.createElement('div');
            ph.className = 'day-card';
            ph.style.visibility = 'hidden';
            grid.appendChild(ph);
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const key = `${y}-${m + 1}-${d}`;
            const card = document.createElement('div');
            card.className = 'day-card';

            const today = new Date();
            if (today.getFullYear() === y && today.getMonth() === m && today.getDate() === d)
                card.classList.add('is-today');
            if (selectedKey === key) card.classList.add('selected-day');

            const tasks = JSON.parse(localStorage.getItem(key) || "[]");
            card.innerHTML = `<span>${d}</span>`;

            if (tasks.length > 0) {
                card.classList.add('has-tasks');
                const dots = document.createElement('div');
                dots.className = 'dot-container';
                const ps = [...new Set(tasks.map(t => t.p))];
                ps.forEach(p => {
                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    dot.style.background = `var(--${p})`;
                    dots.appendChild(dot);
                });
                card.appendChild(dots);
            }

            card.onclick = () => { selectedKey = key; updatePanel(); renderCalendar(); };
            grid.appendChild(card);
        }
    }

    function updatePanel() {
        const list = document.getElementById('taskList');
        const emptyState = document.getElementById('emptyState');
        const statsBar = document.getElementById('statsBar');

        if (!selectedKey) return;

        const [y, m, d] = selectedKey.split('-');
        document.getElementById('panelTitle').innerText =
            `${d} ${new Intl.DateTimeFormat('tr-TR', { month: 'long' }).format(new Date(y, m - 1, d))} ${y}`;

        const tasks = JSON.parse(localStorage.getItem(selectedKey) || "[]");

        // Stats
        const total = tasks.length;
        const done = tasks.filter(t => t.c).length;
        statsBar.style.display = total > 0 ? 'flex' : 'none';
        document.getElementById('statTotal').textContent = total;
        document.getElementById('statDone').textContent = done;
        document.getElementById('statPending').textContent = total - done;

        list.innerHTML = '';
        if (tasks.length === 0) {
            emptyState.style.display = 'block';
            emptyState.innerHTML = '<span class="emoji">✨</span>Bu gün için henüz not yok.';
        } else {
            emptyState.style.display = 'none';
            tasks.forEach((t, i) => {
                const div = document.createElement('div');
                div.className = `task-item ${t.c ? 'completed' : ''}`;
                div.innerHTML = `
                    <div class="priority-bar" style="background:var(--${t.p})"></div>
                    <input type="checkbox" class="task-check" ${t.c ? 'checked' : ''} onchange="toggleStatus(${i})">
                    <div class="task-content">
                        ${t.t ? `<div class="task-time">⏰ ${t.t}</div>` : ''}
                        <div class="task-text">${t.txt}</div>
                    </div>
                    <div class="task-actions">
                        <div class="move-btns">
                            <button class="action-btn" onclick="moveTask(${i}, -1)" title="Yukarı">▲</button>
                            <button class="action-btn" onclick="moveTask(${i}, 1)" title="Aşağı">▼</button>
                        </div>
                        <button class="action-btn" onclick="openEdit(${i})" title="Düzenle">✎</button>
                        <button class="action-btn del" onclick="deleteTask(${i})" title="Sil">✕</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }
    }

    function setP(p) {
        selectedP = p;
        document.querySelectorAll('.p-box').forEach(b => b.classList.remove('active'));
        document.getElementById(`p-${p}`).classList.add('active');
    }

    function openAddModal() {
        if (!selectedKey) { alert("Önce takvimden bir gün seçin!"); return; }
        editIdx = null;
        document.getElementById('modalTitle').innerText = "Yeni Not";
        document.getElementById('taskIn').value = "";
        document.getElementById('timeIn').value = "";
        document.getElementById('modal').classList.add('open');
        setP('low');
        setTimeout(() => document.getElementById('taskIn').focus(), 300);
    }

    function openEdit(i) {
        editIdx = i;
        const tasks = JSON.parse(localStorage.getItem(selectedKey));
        const t = tasks[i];
        document.getElementById('modalTitle').innerText = "Notu Düzenle";
        document.getElementById('taskIn').value = t.txt;
        document.getElementById('timeIn').value = t.t || "";
        document.getElementById('modal').classList.add('open');
        setP(t.p);
    }

    function saveData() {
        const txt = document.getElementById('taskIn').value.trim();
        const t = document.getElementById('timeIn').value;
        if (!txt) return;
        let tasks = JSON.parse(localStorage.getItem(selectedKey) || "[]");
        if (editIdx !== null) tasks[editIdx] = { txt, t, p: selectedP, c: tasks[editIdx].c };
        else tasks.push({ txt, t, p: selectedP, c: false });
        localStorage.setItem(selectedKey, JSON.stringify(tasks));
        closeModal(); updatePanel(); renderCalendar();
    }

    function deleteTask(i) {
        if (!confirm("Bu notu silmek istiyor musunuz?")) return;
        let tasks = JSON.parse(localStorage.getItem(selectedKey));
        tasks.splice(i, 1);
        localStorage.setItem(selectedKey, JSON.stringify(tasks));
        updatePanel(); renderCalendar();
    }

    function moveTask(i, dir) {
        let tasks = JSON.parse(localStorage.getItem(selectedKey));
        const target = i + dir;
        if (target < 0 || target >= tasks.length) return;
        [tasks[i], tasks[target]] = [tasks[target], tasks[i]];
        localStorage.setItem(selectedKey, JSON.stringify(tasks));
        updatePanel();
    }

    function toggleStatus(i) {
        let tasks = JSON.parse(localStorage.getItem(selectedKey));
        tasks[i].c = !tasks[i].c;
        localStorage.setItem(selectedKey, JSON.stringify(tasks));
        updatePanel();
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('open');
    }

    function handleOverlayClick(e) {
        if (e.target === document.getElementById('modal')) closeModal();
    }

    function changeMonth(v) {
        viewDate.setMonth(viewDate.getMonth() + v);
        renderCalendar();
    }

    // Enter to save
    document.getElementById('taskIn').addEventListener('keydown', e => {
        if (e.key === 'Enter') saveData();
    });

    renderCalendar();
</script>
</body>
</html>
