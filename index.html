<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ödeme Takip — Dashboard (Firebase)</title>
  <meta name="theme-color" content="#0b1220" />
  <style>
    :root{
      --bg:#0b1220; --panel:#111a2e; --card:#0f1730;
      --text:#e8f0ff; --muted:#8ea3c7; --line:#1e2a46;
      --good:#2dd4bf; --bad:#fb7185; --warn:#fbbf24; --brand:#4f7cff;
      --shadow: 0 18px 45px rgba(0,0,0,.32);
      --r:16px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(1100px 600px at 20% -10%, rgba(79,124,255,.25), transparent 55%),
                  radial-gradient(900px 500px at 90% 0%, rgba(45,212,191,.16), transparent 55%),
                  linear-gradient(180deg,#071022,#0b1220 40%, #081025);
      color:var(--text);
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:16px;
      padding-bottom: 98px; /* bottom tab bar space */
    }
    .app{
      width:min(1100px, 100%);
      border:1px solid rgba(255,255,255,.06);
      background: rgba(12,18,35,.65);
      backdrop-filter: blur(10px);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height: calc(100vh - 32px - 98px);
    }

    /* Header */
    .header{
      padding:14px;
      border-bottom:1px solid rgba(255,255,255,.06);
      background: linear-gradient(180deg, rgba(17,26,46,.7), rgba(17,26,46,.25));
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .brand{ display:flex; flex-direction:column; gap:4px; }
    .brand h1{ margin:0; font-size:14px; letter-spacing:.2px; }
    .brand small{ color:var(--muted); font-size:12px; }

    .pill{
      border:1px solid var(--line);
      background: rgba(14,22,42,.9);
      padding:8px 10px;
      border-radius: 999px;
      display:flex;
      gap:10px;
      align-items:center;
      color: #cfe0ff;
      font-weight:800;
      font-size:12px;
    }
    .btn{
      border:1px solid var(--line);
      background: rgba(15,23,48,.9);
      color:var(--text);
      border-radius: 14px;
      padding:10px 12px;
      font-weight:800;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:8px;
      user-select:none;
    }
    .btn:hover{ filter:brightness(1.08); }
    .btn.primary{ background: rgba(79,124,255,.95); border-color: rgba(79,124,255,.55); }
    .btn.small{ padding:8px 10px; border-radius: 12px; font-size:12px; }

    input, select{
      border:1px solid var(--line);
      background: rgba(14,22,42,.9);
      color: var(--text);
      padding:10px 12px;
      border-radius: 14px;
      outline:none;
      font-weight:700;
    }
    input::placeholder{ color:#6f86b2; }

    .header .left{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .header .right{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .hint{ color:var(--muted); font-size:12px; }

    .content{
      padding:14px;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .grid{
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap:12px;
    }
    .card{
      background: rgba(17,26,46,.55);
      border:1px solid var(--line);
      border-radius: var(--r);
      padding:12px;
      min-width:0;
    }
    .card h2{ margin:0 0 10px; font-size:13px; color:#cfe0ff; }
    .kpi{ display:flex; flex-direction:column; gap:6px; }
    .kpi .value{ font-size:22px; font-weight:950; letter-spacing:.2px; }
    .value.bad{ color:var(--bad); }
    .value.good{ color:var(--good); }
    .hr{ height:1px; background: rgba(255,255,255,.06); margin:10px 0; }

    /* Table */
    table{ width:100%; border-collapse:collapse; }
    th, td{ border-bottom:1px solid rgba(255,255,255,.06); padding:10px 8px; text-align:left; font-size:13px; }
    th{ color:#bcd1ff; font-size:12px; }
    .right{ text-align:right; }
    .nowrap{ white-space:nowrap; }
    .tag{
      font-size:12px; font-weight:800;
      padding:4px 8px; border-radius: 999px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(14,22,42,.9);
      color:#cfe0ff;
      display:inline-block;
    }
    .tag.bad{ border-color: rgba(251,113,133,.35); background: rgba(42,16,24,.85); color:#ffb3c2; }
    .tag.good{ border-color: rgba(45,212,191,.35); background: rgba(13,42,34,.85); color:#8ff6e4; }
    .tag.rec{ border-color: rgba(79,124,255,.35); background: rgba(27,35,56,.85); color:#c5d3ff; }

    /* Bottom Tab Bar */
    .tabbarWrap{
      position: fixed;
      left: 0; right: 0; bottom: 0;
      display:flex;
      justify-content:center;
      padding: 10px 12px 14px;
      background: linear-gradient(180deg, rgba(11,18,32,0), rgba(11,18,32,.72) 22%, rgba(11,18,32,.96));
      border-top:1px solid rgba(255,255,255,.06);
      z-index: 9999;
    }
    .tabbar{
      width: min(1100px, calc(100% - 24px));
      display:flex;
      gap:10px;
    }
    .tab{
      flex:1;
      border:1px solid rgba(255,255,255,.06);
      background: rgba(14,22,42,.7);
      border-radius: 16px;
      padding:10px 10px;
      cursor:pointer;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      color:var(--muted);
      font-weight:900;
      font-size:11px;
      user-select:none;
    }
    .tab.active{
      color: var(--text);
      border-color: rgba(79,124,255,.35);
      background: rgba(79,124,255,.14);
    }
    .ico{ font-size:16px; line-height:1; }

    /* Modals */
    .modalBg{
      position:fixed; inset:0; background: rgba(0,0,0,.55);
      display:none; align-items:center; justify-content:center; padding:14px;
      z-index: 10000;
    }
    .modalBg.show{ display:flex; }
    .modal{
      width:min(520px, 100%);
      background: rgba(15,23,48,.98);
      border:1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .modalTop{
      padding:10px 12px;
      display:flex; justify-content:space-between; align-items:center;
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .modalTop strong{ font-size:13px; }
    .modalBody{ padding:12px; display:flex; flex-direction:column; gap:10px; }
    .grid2{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    .modal .actions{ display:flex; gap:10px; padding:12px; border-top:1px solid rgba(255,255,255,.06); }

    .toast{
      position:fixed; left:50%; bottom: 92px; transform:translateX(-50%);
      background: rgba(14,22,42,.95);
      border:1px solid var(--line);
      padding:10px 12px;
      border-radius: 14px;
      display:none;
      max-width:min(920px, calc(100% - 24px));
      color:#dbe8ff;
      box-shadow: var(--shadow);
      font-weight:750;
      font-size:13px;
      z-index: 10001;
    }
    .toast.show{ display:block; }

    @media (max-width: 860px){
      .grid { grid-template-columns: repeat(6, 1fr); }
      .tabbar{ width: calc(100% - 24px); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="left">
        <div class="brand">
          <h1>Ödeme Takip</h1>
          <small id="subline">Dashboard</small>
        </div>

        <button id="btnPrev" class="btn small">◀</button>
        <span class="pill"><span>📅</span><span id="monthLabel">—</span></span>
        <button id="btnNext" class="btn small">▶</button>

        <select id="statusFilter">
          <option value="all">Durum: Hepsi</option>
          <option value="unpaid">Durum: Alınmadı/Ödenmedi</option>
          <option value="paid">Durum: Alındı/Ödendi</option>
        </select>

        <input id="search" placeholder="Ara (açıklama / kategori / kişi)" />
      </div>

      <div class="right">
        <span id="userPill" class="pill" style="display:none;"><span>👤</span><span id="userEmail" class="nowrap"></span></span>
        <button id="btnAdd" class="btn primary" style="display:none;">＋ Yeni</button>
        <button id="btnLogout" class="btn" style="display:none;">Çıkış</button>
        <button id="btnLoginOpen" class="btn primary">Giriş</button>
        <span class="hint" id="topHint"></span>
      </div>
    </header>

    <div id="content" class="content"></div>
  </div>

  <!-- Bottom Tabs -->
  <div class="tabbarWrap">
    <div class="tabbar">
      <div class="tab active" data-page="dashboard"><div class="ico">📊</div>Dashboard</div>
      <div class="tab" data-page="expense"><div class="ico">💸</div>Gider</div>
      <div class="tab" data-page="income"><div class="ico">💰</div>Gelir</div>
      <div class="tab" data-page="calendar"><div class="ico">📆</div>Takvim</div>
      <div class="tab" data-page="settings"><div class="ico">⚙️</div>Ayarlar</div>
    </div>
  </div>

  <!-- AUTH MODAL -->
  <div id="authBg" class="modalBg">
    <div class="modal">
      <div class="modalTop">
        <strong>Giriş / Kayıt</strong>
        <button id="authClose" class="btn small">✕</button>
      </div>
      <div class="modalBody">
        <div class="hint">Dosyada <b>firebaseConfig</b> alanını kendi projenle doldur.</div>
        <input id="aEmail" type="email" placeholder="E-posta" autocomplete="email" />
        <input id="aPass" type="password" placeholder="Şifre" autocomplete="current-password" />
        <div class="grid2">
          <button id="btnLogin" class="btn primary">Giriş Yap</button>
          <button id="btnRegister" class="btn">Kayıt Ol</button>
        </div>
        <div class="hint" id="authErr" style="display:none;"></div>
      </div>
    </div>
  </div>

  <!-- ADD MODAL -->
  <div id="addBg" class="modalBg">
    <div class="modal">
      <div class="modalTop">
        <strong>Yeni Kayıt</strong>
        <button id="addClose" class="btn small">✕</button>
      </div>
      <div class="modalBody">
        <div class="grid2">
          <select id="mType">
            <option value="expense">Gider</option>
            <option value="income">Gelir</option>
          </select>
          <select id="mStatus">
            <option value="unpaid">Alınmadı/Ödenmedi</option>
            <option value="paid">Alındı/Ödendi</option>
          </select>
        </div>
        <div class="grid2">
          <input id="mAmount" type="number" step="0.01" placeholder="Tutar (₺)" />
          <input id="mDate" type="date" />
        </div>
        <div class="grid2">
          <input id="mPerson" placeholder="Kişi (opsiyon)" />
          <input id="mCategory" placeholder="Kategori (örn: Kira, Maaş)" />
        </div>
        <input id="mDesc" placeholder="Açıklama" />
        <div class="hint">Bu sürüm: <b>payments</b> koleksiyonuna kaydeder (uid ile ayırır).</div>
      </div>
      <div class="actions">
        <button id="addSave" class="btn primary" style="flex:1;">Kaydet</button>
        <button id="addCancel" class="btn" style="flex:1;">Vazgeç</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    import { getFirestore, collection, query, where, orderBy, onSnapshot, addDoc, doc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    // 1) BURAYI DOLDUR (senin config)
    const firebaseConfig = {
          apiKey: "AIzaSyCor3xd3b5oISqFTChJeO1KNR6FsCQiAKg",
          authDomain: "gezi-5b54b.firebaseapp.com",
          projectId: "gezi-5b54b",
          storageBucket: "gezi-5b54b.firebasestorage.app",
          messagingSenderId: "926426747002",
          appId: "1:926426747002:web:15ea0e6c6fb19b2c156bc3",
          measurementId: "G-KB8SKRCQ9X"
        };

    const $ = (id) => document.getElementById(id);
    const fmt = new Intl.NumberFormat("tr-TR", { style:"currency", currency:"TRY" });

    function toast(msg){
      const t = $("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(()=>t.classList.remove("show"), 2400);
    }
    function pad2(n){ return String(n).padStart(2,"0"); }
    function ymFromDate(d){ return d.getFullYear()+"-"+pad2(d.getMonth()+1); }
    function nextMonth(ym){
      const [y,m] = ym.split("-").map(Number);
      const d = new Date(y, m-1, 1); d.setMonth(d.getMonth()+1);
      return ymFromDate(d);
    }
    function prevMonth(ym){
      const [y,m] = ym.split("-").map(Number);
      const d = new Date(y, m-1, 1); d.setMonth(d.getMonth()-1);
      return ymFromDate(d);
    }
    function todayStr(){
      const d = new Date();
      return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());
    }
    function escapeHtml(s){
      return String(s ?? "").replace(/[&<>"']/g, (m) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"
      }[m]));
    }

    let app, auth, db;
    try{
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
    }catch(e){
      console.error(e);
      toast("Firebase config eksik/yanlış. Dosyada firebaseConfig'i doldur.");
    }

    let selectedMonth = ymFromDate(new Date());
    let currentPage = "dashboard";
    let unsub = null;
    let lastRows = [];
    let user = null;

    // Tabs (bottom)
    document.querySelectorAll(".tab").forEach(tab=>{
      tab.addEventListener("click", ()=>{
        document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
        tab.classList.add("active");
        currentPage = tab.dataset.page;
        $("subline").textContent =
          currentPage === "dashboard" ? "Dashboard" :
          currentPage === "expense" ? "Gider" :
          currentPage === "income" ? "Gelir" :
          currentPage === "calendar" ? "Takvim" : "Ayarlar";
        renderPage();
      });
    });

    // Month nav & filters
    $("btnPrev").addEventListener("click", ()=>{ selectedMonth = prevMonth(selectedMonth); onMonthChanged(); });
    $("btnNext").addEventListener("click", ()=>{ selectedMonth = nextMonth(selectedMonth); onMonthChanged(); });
    $("statusFilter").addEventListener("change", ()=>renderPage());
    $("search").addEventListener("input", ()=>renderPage());

    // Auth modal
    const authBg = $("authBg");
    $("btnLoginOpen").addEventListener("click", ()=>authBg.classList.add("show"));
    $("authClose").addEventListener("click", ()=>authBg.classList.remove("show"));
    authBg.addEventListener("click", (e)=>{ if(e.target===authBg) authBg.classList.remove("show"); });

    $("btnLogin").addEventListener("click", async ()=>{
      const email = $("aEmail").value.trim();
      const pass = $("aPass").value;
      if(!email || !pass) return showAuthErr("E-posta/şifre gir.");
      try{
        await signInWithEmailAndPassword(auth, email, pass);
        hideAuthErr();
        authBg.classList.remove("show");
      }catch(e){
        console.error(e);
        showAuthErr(e.code || e.message);
      }
    });

    $("btnRegister").addEventListener("click", async ()=>{
      const email = $("aEmail").value.trim();
      const pass = $("aPass").value;
      if(!email || !pass) return showAuthErr("E-posta/şifre gir.");
      try{
        await createUserWithEmailAndPassword(auth, email, pass);
        hideAuthErr();
        authBg.classList.remove("show");
      }catch(e){
        console.error(e);
        showAuthErr(e.code || e.message);
      }
    });

    function showAuthErr(msg){
      const el = $("authErr");
      el.style.display = "";
      el.textContent = msg;
    }
    function hideAuthErr(){
      const el = $("authErr");
      el.style.display = "none";
      el.textContent = "";
    }

    $("btnLogout").addEventListener("click", async ()=>{ try{ await signOut(auth); }catch(e){ console.error(e); } });

    // Add modal
    const addBg = $("addBg");
    $("btnAdd").addEventListener("click", ()=>{
      if(!user) return toast("Önce giriş yap.");
      $("mType").value = "expense";
      $("mStatus").value = "unpaid";
      $("mAmount").value = "";
      $("mDate").value = todayStr();
      $("mPerson").value = "";
      $("mCategory").value = "";
      $("mDesc").value = "";
      addBg.classList.add("show");
    });
    $("addClose").addEventListener("click", ()=>addBg.classList.remove("show"));
    $("addCancel").addEventListener("click", ()=>addBg.classList.remove("show"));
    addBg.addEventListener("click",(e)=>{ if(e.target===addBg) addBg.classList.remove("show"); });

    $("addSave").addEventListener("click", async ()=>{
      if(!user) return;
      const type = $("mType").value;
      const status = $("mStatus").value;
      const amount = Number($("mAmount").value);
      const date = $("mDate").value;
      const person = $("mPerson").value.trim();
      const category = $("mCategory").value.trim();
      const description = $("mDesc").value.trim();
      if(!amount || amount<=0) return toast("Tutar gir.");
      if(!date) return toast("Tarih seç.");

      const month = date.slice(0,7);

      try{
        await addDoc(collection(db, "payments"), {
          uid: user.uid,
          type, status, amount,
          date, month,
          person, category, description,
          source: "manual",
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
        addBg.classList.remove("show");
        toast("Kaydedildi.");
      }catch(e){
        console.error(e);
        toast("Kaydetme hatası: " + (e.code || e.message));
      }
    });

    function startListener(){
      if(!user || !db) return;
      if(unsub){ unsub(); unsub = null; }

      const q = query(
        collection(db, "payments"),
        where("uid", "==", user.uid),
        where("month", "==", selectedMonth),
        orderBy("date", "desc")
      );

      unsub = onSnapshot(q, (snap)=>{
        lastRows = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        $("topHint").textContent = "";
        renderPage();
      }, (err)=>{
        console.error(err);
        const msg = (err.code || err.message || "").toString();
        if(msg.includes("failed-precondition") || msg.includes("requires an index")){
          $("topHint").textContent = "Index gerekli: Firestore hata mesajındaki link → Create Index.";
        }else{
          $("topHint").textContent = "Okuma hatası: " + msg;
        }
        toast("Veri okunamadı. Konsolu kontrol et.");
      });
    }

    function onMonthChanged(){
      $("monthLabel").textContent = selectedMonth;
      if(user) startListener();
      renderPage();
    }

    function filteredRows(base, typeFilter){
      const st = $("statusFilter").value;
      const q = $("search").value.trim().toLowerCase();
      let rows = base.slice();
      if(typeFilter) rows = rows.filter(r => r.type === typeFilter);
      if(st !== "all") rows = rows.filter(r => (r.status || "unpaid") === st);
      if(q){
        rows = rows.filter(r=>{
          const blob = ((r.description||"") + " " + (r.category||"") + " " + (r.person||"")).toLowerCase();
          return blob.includes(q);
        });
      }
      // safety net de-dup
      const seen = new Set();
      const out = [];
      for(const r of rows){
        const key = (r.source === "recurring" && r.recurrenceId) ? (r.recurrenceId + "_" + r.month) : r.id;
        if(seen.has(key)) continue;
        seen.add(key);
        out.push(r);
      }
      return out;
    }

    function kpisFor(rows){
      const exp = rows.filter(r=>r.type==="expense").reduce((s,r)=>s+Number(r.amount||0),0);
      const inc = rows.filter(r=>r.type==="income").reduce((s,r)=>s+Number(r.amount||0),0);
      const net = inc - exp;
      const expPaid = rows.filter(r=>r.type==="expense" && r.status==="paid").length;
      const expUn   = rows.filter(r=>r.type==="expense" && r.status!=="paid").length;
      const incPaid = rows.filter(r=>r.type==="income" && r.status==="paid").length;
      const incUn   = rows.filter(r=>r.type==="income" && r.status!=="paid").length;
      return { exp, inc, net, expPaid, expUn, incPaid, incUn };
    }

    function renderTable(rows){
      if(!rows.length) return `<div class="hint">Kayıt yok.</div>`;
      const head = `
        <table>
          <thead>
            <tr>
              <th class="nowrap">Tarih</th>
              <th>Tür</th>
              <th>Açıklama</th>
              <th class="right nowrap">Tutar</th>
              <th>Durum</th>
              <th>Kaynak</th>
              <th class="right">İşlem</th>
            </tr>
          </thead>
          <tbody>
      `;
      const body = rows.map(r=>{
        const t = r.type === "income" ? `<span class="tag good">Gelir</span>` : `<span class="tag bad">Gider</span>`;
        const s = r.status === "paid" ? `<span class="tag good">Alındı/Ödendi</span>` : `<span class="tag">Alınmadı</span>`;
        const src = r.source === "recurring" ? `<span class="tag rec">Aylık</span>` : `<span class="tag">Manuel</span>`;
        const amtColor = r.type === "income" ? "var(--good)" : "var(--bad)";
        const desc = escapeHtml(r.description || "");
        const meta = [r.person, r.category].filter(Boolean).join(" • ");
        return `
          <tr>
            <td class="nowrap">${escapeHtml((r.date||"").slice(0,10) || "-")}</td>
            <td>${t}</td>
            <td>
              <div style="font-weight:900">${desc || "—"}</div>
              <div class="hint">${escapeHtml(meta || "")}</div>
            </td>
            <td class="right nowrap" style="font-weight:950; color:${amtColor}">${fmt.format(Number(r.amount||0))}</td>
            <td>${s}</td>
            <td>${src}</td>
            <td class="right nowrap">
              <button class="btn small" data-act="toggle" data-id="${r.id}">${r.status==="paid" ? "Geri Al" : "Ödendi"}</button>
              <button class="btn small" data-act="del" data-id="${r.id}">Sil</button>
            </td>
          </tr>
        `;
      }).join("");
      return head + body + `</tbody></table>`;
    }

    function bindTableActions(){
      document.querySelectorAll("button[data-act]").forEach(btn=>{
        btn.addEventListener("click", async ()=>{
          const act = btn.dataset.act;
          const id = btn.dataset.id;
          if(!user) return;
          try{
            const ref = doc(db, "payments", id);
            if(act === "toggle"){
              const row = lastRows.find(r=>r.id===id);
              const cur = row?.status || "unpaid";
              const next = (cur === "paid") ? "unpaid" : "paid";
              await updateDoc(ref, { status: next, updatedAt: serverTimestamp() });
              toast("Güncellendi.");
            }
            if(act === "del"){
              await deleteDoc(ref);
              toast("Silindi.");
            }
          }catch(e){
            console.error(e);
            toast("İşlem hatası: " + (e.code || e.message));
          }
        });
      });
    }

    function renderPage(){
      $("monthLabel").textContent = selectedMonth;
      const content = $("content");
      const rowsMonth = filteredRows(lastRows, null);
      const k = kpisFor(rowsMonth);

      if(!user){
        content.innerHTML = `
          <div class="card">
            <h2>Başlamak için giriş yap</h2>
            <div class="hint">Sağ üstten <b>Giriş</b> butonuna bas. firebaseConfig'i doldurduğundan emin ol.</div>
            <div class="hr"></div>
            <div class="hint">Bu arayüz <b>payments</b> koleksiyonunu kullanır ve kayıtları <b>uid</b> ile ayırır.</div>
          </div>
        `;
        return;
      }

      if(currentPage === "dashboard"){
        content.innerHTML = `
          <div class="grid">
            <div class="card" style="grid-column: span 4;">
              <h2>Bu Ay Gider</h2>
              <div class="kpi">
                <div class="value bad">${fmt.format(k.exp)}</div>
                <div class="hint">Ödendi ${k.expPaid} • Ödenmedi ${k.expUn}</div>
              </div>
            </div>
            <div class="card" style="grid-column: span 4;">
              <h2>Bu Ay Gelir</h2>
              <div class="kpi">
                <div class="value good">${fmt.format(k.inc)}</div>
                <div class="hint">Alındı ${k.incPaid} • Alınmadı ${k.incUn}</div>
              </div>
            </div>
            <div class="card" style="grid-column: span 4;">
              <h2>Net</h2>
              <div class="kpi">
                <div class="value ${k.net>=0 ? "good" : "bad"}">${fmt.format(k.net)}</div>
                <div class="hint">Net = Gelir − Gider</div>
              </div>
            </div>

            <div class="card" style="grid-column: span 8;">
              <h2>Son İşlemler</h2>
              <div class="hint">${selectedMonth} içinde ${rowsMonth.length} kayıt (UI tekilleştirme aktif)</div>
              <div style="overflow:auto; margin-top:10px;">
                ${renderTable(rowsMonth.slice(0, 12))}
              </div>
            </div>

            <div class="card" style="grid-column: span 4;">
              <h2>Hızlı Notlar</h2>
              <div class="hint">• Yeni kayıt: üstte <b>＋ Yeni</b></div>
              <div class="hint">• Menü: alttaki sekmeler</div>
              <div class="hr"></div>
              <div class="hint"><b>Tekrarlayan çoğalma</b> için “ay üretimi”ni <i>addDoc</i> yerine <i>setDoc(deterministicId)</i> ile kurgulayacağız.</div>
            </div>
          </div>
        `;
        bindTableActions();
        return;
      }

      if(currentPage === "expense"){
        const rows = filteredRows(lastRows, "expense");
        content.innerHTML = `
          <div class="card">
            <h2>Gider • ${selectedMonth}</h2>
            <div class="hint">${rows.length} kayıt</div>
            <div style="overflow:auto; margin-top:10px;">
              ${renderTable(rows)}
            </div>
          </div>
        `;
        bindTableActions();
        return;
      }

      if(currentPage === "income"){
        const rows = filteredRows(lastRows, "income");
        content.innerHTML = `
          <div class="card">
            <h2>Gelir • ${selectedMonth}</h2>
            <div class="hint">${rows.length} kayıt</div>
            <div style="overflow:auto; margin-top:10px;">
              ${renderTable(rows)}
            </div>
          </div>
        `;
        bindTableActions();
        return;
      }

      if(currentPage === "calendar"){
        content.innerHTML = `
          <div class="card">
            <h2>Takvim</h2>
            <div class="hint">Bu ekranı bir sonraki adımda aktif ediyoruz: seçili ayın tüm kayıtlarını çekip günlere dağıtacağız.</div>
          </div>
        `;
        return;
      }

      if(currentPage === "settings"){
        content.innerHTML = `
          <div class="card">
            <h2>Ayarlar</h2>
            <div class="hint"><b>Koleksiyon:</b> payments</div>
            <div class="hint"><b>Kullanıcı ayrımı:</b> uid alanı</div>
            <div class="hr"></div>
            <div class="hint">Rules sıkılaştırma örneği (global payments):</div>
            <pre class="hint" style="white-space:pre-wrap; background:rgba(14,22,42,.6); border:1px solid rgba(255,255,255,.06); padding:10px; border-radius:14px; margin:10px 0 0;">rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /payments/{docId} {
      allow read: if request.auth != null;
      allow create: if request.auth != null
        && request.resource.data.uid == request.auth.uid;
      allow update, delete: if request.auth != null
        && resource.data.uid == request.auth.uid;
    }
  }
}</pre>
          </div>
        `;
        return;
      }
    }

    // Auth state
    onAuthStateChanged(auth, (u)=>{
      user = u;
      $("monthLabel").textContent = selectedMonth;

      if(!u){
        $("userPill").style.display = "none";
        $("btnLogout").style.display = "none";
        $("btnAdd").style.display = "none";
        $("btnLoginOpen").style.display = "inline-flex";
        $("userEmail").textContent = "";
        $("topHint").textContent = "";
        lastRows = [];
        if(unsub){ unsub(); unsub = null; }
        renderPage();
        return;
      }

      $("userPill").style.display = "inline-flex";
      $("btnLogout").style.display = "inline-flex";
      $("btnAdd").style.display = "inline-flex";
      $("btnLoginOpen").style.display = "none";
      $("userEmail").textContent = u.email || "—";
      $("topHint").textContent = "";

      startListener();
      renderPage();
    });

    // init
    $("mDate").value = todayStr();
    $("monthLabel").textContent = selectedMonth;
    renderPage();
  </script>
</body>
</html>
